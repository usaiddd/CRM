<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Records Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: #f8fafc;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }

        .header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-success {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .new-row td {
            background: rgba(56, 189, 248, 0.05) !important;
            border-bottom: 1px solid #38bdf8 !important;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .main-content {
            flex-grow: 1;
            overflow: auto;
            padding: 0;
            background: transparent;
        }

        .records-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        .records-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .records-table th {
            background: #1e293b;
            color: #94a3b8;
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            border-bottom: 2px solid #334155;
            white-space: nowrap;
        }

        .records-table td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
            background: rgba(30, 41, 59, 0.4);
            transition: all 0.2s ease;
        }

        .records-table tr:hover td {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
        }

        .record-id {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-weight: 700;
            color: #38bdf8;
        }

        .source-cell {
            font-size: 13px;
            color: #94a3b8;
            white-space: nowrap;
            min-width: 150px;
        }

        .info-cell {
            font-size: 13px;
            line-height: 1.5;
            color: #cbd5e1;
            min-width: 400px;
        }

        td[contenteditable="true"] {
            cursor: cell;
        }

        td[contenteditable="true"]:focus {
            background: rgba(56, 189, 248, 0.2);
            outline: 2px solid #38bdf8;
            border-radius: 4px;
        }

        .scrollbar-custom::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .scrollbar-custom::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="header-icon">📁</div>
                CONTACT RECORDS - <span id="contactName">Loading...</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="returnToPortal()">
                    <span>🏠</span> Portal
                </button>
                <button class="btn btn-secondary" onclick="returnToContact()">
                    <span>⬅️</span> Back
                </button>
                <button class="btn btn-primary" onclick="addNewRecordRow()">
                    <span>➕</span> Add Contact Record
                </button>
                <button class="btn btn-success" onclick="saveRecords()">
                    <span>💾</span> Save Record
                </button>
            </div>
        </div>

        <div class="main-content scrollbar-custom">
            <table class="records-table">
                <thead>
                    <tr>
                        <th>Record No</th>
                        <th>Contact ID</th>
                        <th>Contact Source</th>
                        <th>Contact Info</th>
                    </tr>
                </thead>
                <tbody id="recordsBody">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const contactId = urlParams.get('contact_id');

        if (!contactId) {
            alert('No contact ID provided.');
            window.location.href = 'contact_person_records.html';
        }

        async function fetchContactDetails() {
            try {
                const res = await fetch(`/api/contacts/${contactId}`);
                const data = await res.json();
                if (data && !data.error) {
                    document.getElementById('contactName').textContent = `${data.first_name} ${data.last_name} (${contactId})`;
                }
            } catch (err) { }
        }

        async function loadRecords() {
            try {
                const res = await fetch(`/api/contacts/${contactId}/records`);
                const records = await res.json();
                const tbody = document.getElementById('recordsBody');
                tbody.innerHTML = '';
                records.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="record-id">${r.record_number}</td>
                        <td>${r.contact_id}</td>
                        <td class="source-cell">${r.contact_source || ''}</td>
                        <td class="info-cell">${r.contact_info || ''}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) { }
        }

        function addNewRecordRow() {
            const existingNewRow = document.querySelector('.new-row');
            if (existingNewRow) {
                alert('Please save the current record before adding another one.');
                return;
            }

            const tbody = document.getElementById('recordsBody');
            const tr = document.createElement('tr');
            tr.className = 'new-row';
            tr.innerHTML = `
                <td class="record-id">NEW</td>
                <td>${contactId}</td>
                <td class="source-cell" contenteditable="true" placeholder="Enter source..."></td>
                <td class="info-cell" contenteditable="true" placeholder="Enter contact info..."></td>
            `;
            tbody.prepend(tr);
            tr.querySelector('.source-cell').focus();
        }

        async function saveRecords() {
            const newRow = document.querySelector('.new-row');
            if (!newRow) {
                alert('No new record to save.');
                return;
            }

            const cells = newRow.cells;
            const recordData = {
                contact_id: contactId,
                contact_source: cells[2].innerText.trim(),
                contact_info: cells[3].innerText.trim()
            };

            if (!recordData.contact_info) {
                alert('Please enter contact info.');
                return;
            }

            try {
                const response = await fetch('/api/contacts/records', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(recordData)
                });

                if (response.ok) {
                    alert('Record saved successfully!');
                    loadRecords();
                } else {
                    const error = await response.json();
                    alert('Error saving record: ' + (error.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Network error saving record.');
            }
        }

        function returnToContact() {
            window.location.href = `contact_person_records.html?contact_id=${contactId}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchContactDetails();
            loadRecords();
        });
    </script>
    <script src="/profile.js"></script>
</body>
</html>
